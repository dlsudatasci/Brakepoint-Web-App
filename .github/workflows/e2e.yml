name: E2E Tests (Playwright)

# Run only when opening / updating a PR toward develop or main.
# Skip on direct pushes to reduce CI time on feature branches.
on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SECRET_KEY: "ci-e2e-secret-key"
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: BrakePoint_Project.e2e_settings
      NEXT_PUBLIC_MAPILLARY_TOKEN: "ci-dummy-token"
      # Credentials for a seed user created in the setup step
      TEST_USERNAME: e2euser
      TEST_PASSWORD: e2epassword
      FRONTEND_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:8000"

    steps:
      - uses: actions/checkout@v4

      # ── Python / Django backend ───────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Create E2E test user & run migrations
        working-directory: backend
        run: |
          python manage.py migrate --run-syncdb
          python manage.py shell -c "
          from django.contrib.auth.models import User
          if not User.objects.filter(username='e2euser').exists():
              User.objects.create_user('e2euser', 'e2e@test.com', 'e2epassword')
          "

      - name: Start Django dev server
        working-directory: backend
        run: |
          python manage.py runserver 8000 &
          # Wait until the server is accepting connections
          timeout 30 bash -c 'until curl -s http://localhost:8000/api/check-auth/ > /dev/null; do sleep 1; done'

      # ── Node / Next.js frontend ───────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/brakepoint_app/package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend/brakepoint_app
        run: npm ci

      - name: Build Next.js
        working-directory: frontend/brakepoint_app
        run: npm run build

      - name: Start Next.js server
        working-directory: frontend/brakepoint_app
        run: |
          npm run start &
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
